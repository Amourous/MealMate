[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"

# SPA catch-all — serves index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
